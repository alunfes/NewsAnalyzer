<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily News Briefing</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --text: #c9d1d9;
            --heading: #f0f6fc;
            --accent: #58a6ff;
            --highlight-high: #f85149;
            --highlight-med: #d29922;
            --highlight-low: #3fb950;
            --border: #30363d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { color: var(--heading); font-size: 1.4em; margin-bottom: 8px; }
        h2 { color: var(--accent); font-size: 1.15em; margin: 20px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        h3 { color: var(--heading); font-size: 1em; margin: 12px 0 6px; }
        .date { color: #8b949e; font-size: 0.9em; margin-bottom: 16px; }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
        }
        .card-high { border-left: 3px solid var(--highlight-high); }
        .card-medium { border-left: 3px solid var(--highlight-med); }
        .card-low { border-left: 3px solid var(--highlight-low); }
        .tag {
            display: inline-block;
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 12px;
            margin: 2px 4px 2px 0;
        }
        .tag-high { background: rgba(248,81,73,0.2); color: var(--highlight-high); }
        .tag-medium { background: rgba(210,153,34,0.2); color: var(--highlight-med); }
        .tag-low { background: rgba(63,185,80,0.2); color: var(--highlight-low); }
        .action { background: var(--card-bg); padding: 8px; border-radius: 4px; margin-top: 6px; font-size: 0.9em; color: var(--accent); }
        .market { background: linear-gradient(135deg, #161b22, #1c2333); }
        .investment { border-left: 3px solid var(--accent); }
        .disclaimer { font-size: 0.75em; color: #8b949e; margin-top: 8px; padding: 8px; border: 1px dashed var(--border); border-radius: 4px; }
        .topic-section { margin-bottom: 16px; }
        .trend { font-size: 0.85em; color: #8b949e; font-style: italic; }
        .footer { text-align: center; color: #484f58; font-size: 0.8em; margin-top: 24px; padding-top: 12px; border-top: 1px solid var(--border); }
        .nav { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .nav a { color: var(--accent); text-decoration: none; font-size: 0.85em; padding: 4px 10px; border: 1px solid var(--border); border-radius: 16px; }
        .nav a:hover { background: var(--card-bg); }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-item { text-align: center; padding: 8px; background: var(--card-bg); border-radius: 6px; }
        .stat-value { font-size: 1.2em; font-weight: bold; color: var(--heading); }
        .stat-label { font-size: 0.75em; color: #8b949e; }
        details { margin: 4px 0; }
        details summary { cursor: pointer; color: var(--accent); font-size: 0.9em; }
        ul { list-style: none; padding-left: 0; }
        ul li { padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 0.9em; }
        ul li:last-child { border-bottom: none; }
        .past-reports a { color: var(--accent); text-decoration: none; display: block; padding: 8px; }
    </style>
</head>
<body>
    <h1>📋 デイリーニュースブリーフィング</h1>
    <div class="date" id="report-date">読み込み中...</div>

    <div id="content">
        <p>レポートを読み込んでいます...</p>
    </div>

    <h2>📂 過去のレポート</h2>
    <div id="past-reports" class="past-reports"></div>

    <div class="footer">
        NewsAnalyzer - Automated Daily Briefing
    </div>

    <script>
        async function loadReport(date) {
            try {
                const response = await fetch(`reports/${date}.json`);
                if (!response.ok) throw new Error('Report not found');
                const data = await response.json();
                renderReport(data);
            } catch(e) {
                document.getElementById('content').innerHTML = '<p>レポートの読み込みに失敗しました。</p>';
            }
        }

        function renderReport(data) {
            document.getElementById('report-date').textContent =
                `${data.report_date}（${data.weekday || ''}）`;

            let html = '';

            // エグゼクティブサマリー
            html += `<h2>🔑 サマリー</h2>`;
            html += `<div class="card">${data.daily_report?.executive_summary || 'N/A'}</div>`;

            // 注目ポイント
            if (data.daily_report?.top_highlights?.length) {
                html += `<h2>⭐ 注目ポイント</h2>`;
                for (const h of data.daily_report.top_highlights) {
                    html += `<div class="card card-${h.importance || 'medium'}">`;
                    html += `<span class="tag tag-${h.importance || 'medium'}">${h.importance || 'medium'}</span>`;
                    if (h.topic) html += ` <span class="tag" style="background:rgba(88,166,255,0.1);color:var(--accent)">${h.topic}</span>`;
                    html += `<h3>${h.title}</h3><p>${h.description}</p>`;
                    if (h.action) html += `<div class="action">💡 ${h.action}</div>`;
                    html += `</div>`;
                }
            }

            // マーケット
            if (data.daily_report?.market_brief) {
                html += `<h2>📊 マーケット</h2>`;
                html += `<div class="card market">${data.daily_report.market_brief}</div>`;
            }

            // 投資提案
            if (data.daily_report?.investment_suggestions?.length) {
                html += `<h2>💰 投資提案</h2>`;
                for (const s of data.daily_report.investment_suggestions) {
                    html += `<div class="card investment">`;
                    html += `<h3>${s.suggestion}</h3><p>${s.rationale}</p>`;
                    html += `<span class="tag tag-${s.risk_level || 'medium'}">${s.risk_level || 'medium'} risk</span>`;
                    html += ` <span class="tag" style="background:rgba(88,166,255,0.1);color:var(--accent)">${s.timeframe || ''}</span>`;
                    html += `</div>`;
                }
                html += `<div class="disclaimer">⚠️ これは情報提供であり、投資助言ではありません。投資判断は自己責任でお願いします。</div>`;
            }

            // トピック詳細
            if (data.topic_analyses) {
                html += `<h2>📑 トピック詳細</h2>`;
                for (const [name, analysis] of Object.entries(data.topic_analyses)) {
                    html += `<details class="topic-section"><summary><strong>${name}</strong></summary>`;
                    html += `<div class="card"><p>${analysis.summary || ''}</p>`;
                    if (analysis.highlights?.length) {
                        html += '<ul>';
                        for (const h of analysis.highlights) {
                            html += `<li><span class="tag tag-${h.importance || 'low'}">${h.importance || ''}</span> <strong>${h.title}</strong>: ${h.description}`;
                            if (h.action_needed) html += ` → <em>${h.action_needed}</em>`;
                            html += `</li>`;
                        }
                        html += '</ul>';
                    }
                    if (analysis.trend_comparison) html += `<p class="trend">📈 ${analysis.trend_comparison}</p>`;
                    html += `</div></details>`;
                }
            }

            // 暮らしのヒント
            if (data.daily_report?.lifestyle_tips) {
                html += `<h2>🏠 暮らしのヒント</h2><div class="card">${data.daily_report.lifestyle_tips}</div>`;
            }

            // 週末提案
            if (data.daily_report?.weekend_suggestions) {
                html += `<h2>🎯 週末のおすすめ</h2><div class="card">${data.daily_report.weekend_suggestions}</div>`;
            }

            // トレンドアラート
            if (data.daily_report?.trend_alerts?.length) {
                html += `<h2>⚠️ トレンドアラート</h2><ul>`;
                for (const a of data.daily_report.trend_alerts) {
                    html += `<li>${a}</li>`;
                }
                html += `</ul>`;
            }

            // 統計
            html += `<h2>📊 統計</h2><div class="stats">`;
            html += `<div class="stat-item"><div class="stat-value">${data.topic_count || 0}</div><div class="stat-label">トピック</div></div>`;
            html += `<div class="stat-item"><div class="stat-value">${data.total_articles || 0}</div><div class="stat-label">収集記事</div></div>`;
            html += `</div>`;

            document.getElementById('content').innerHTML = html;
        }

        async function loadReportList() {
            try {
                const response = await fetch('reports/index.json');
                if (!response.ok) return;
                const dates = await response.json();
                const container = document.getElementById('past-reports');
                let listHtml = '<ul>';
                for (const d of dates.slice(0, 14)) {
                    listHtml += `<li><a href="#" onclick="loadReport('${d}');return false;">${d}</a></li>`;
                }
                listHtml += '</ul>';
                container.innerHTML = listHtml;

                if (dates.length > 0) loadReport(dates[0]);
            } catch(e) {
                console.error('Failed to load report list:', e);
            }
        }

        loadReportList();
    </script>
</body>
</html>
